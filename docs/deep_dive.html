<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --panel: #1c1c20;

    --text: #e8e8ed;

    --sidebar-w: 230px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -0.5px;
    color: #7ee8a2;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); font-weight: 400; }

  #status-text {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #status-text.loaded { color: var(--text); }

  button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 11px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  button:hover:not(:disabled) { background: var(--border); border-color: var(--muted); }
  button:active:not(:disabled) { background: var(--muted); }
  button:disabled { opacity: 0.3; cursor: default; }

  input[type="file"] { display: none; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Layout ── */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-title {
    padding: 10px 12px 8px;
    font-family: var(--display);
    font-weight: 800;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-filter {
    padding: 6px 10px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-filter input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: var(--radius);
    outline: none;
  }
  .sidebar-filter input:focus { border-color: var(--muted); }
  .sidebar-filter input::placeholder { color: var(--muted); }

  .group-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .prefix-section { margin-bottom: 1px; }

  .prefix-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .prefix-header:hover { background: var(--panel); }

  .prefix-arrow { font-size: 8px; color: var(--muted); width: 10px; flex-shrink: 0; }
  .prefix-label {
    font-family: var(--display);
    font-weight: 800;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;

  .prefix-pts { font-size: 10px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  .entry-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 22px;
    font-size: 10px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .entry-row:hover { background: var(--panel); }
  .entry-row.active { background: rgba(255,255,255,0.03); border-left-color: #7ee8a2; }

  .entry-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .entry-name { flex: 1; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-row.active .entry-name { color: var(--text); }
  .entry-n    { color: var(--muted); flex-shrink: 0; white-space: nowrap; }

  /* ── Main area ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .n-slider-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .controls-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #n-slider {
    flex: 1;
    max-width: 360px;
    accent-color: #7ee8a2;
    cursor: pointer;
    height: 3px;
  }

  #n-slider-label { font-size: 11px; color: var(--text); white-space: nowrap; min-width: 60px; }

  .controls-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  #btn-scale { font-size: 11px; padding: 3px 10px; }

  /* ── Nav ── */
  .page-nav { display: flex; align-items: center; gap: 2px; margin-left: 8px; }
  .nav-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    padding: 3px 8px;
    border-radius: var(--radius);
    transition: color 0.12s, background 0.12s;
    white-space: nowrap;
  }
  .nav-link:hover { color: var(--text); background: var(--panel); }
  .nav-link.current { color: var(--text); }

  /* ── Charts area ── */
  .charts-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .chart-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    color: var(--text);
  }

  .chart-subtitle { font-size: 10px; color: var(--text-dim); }

  .chart-wrap { position: relative; height: 300px; }

  .theta-wrap { height: 420px; }

  .pairs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .pair-wrap { height: 220px; }
  .hist-wrap  { height: 180px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    padding: 60px 20px;
    flex: 1;
  }
  .empty-state .icon { font-size: 36px; line-height: 1; }
</style>

<input type="file" id="folder-input" webkitdirectory multiple>

<header>
  <div class="logo">Deep<span>Dive</span></div>

    <a class="nav-link current" href="/deep_dive.html">deep dive</a>
    <a class="nav-link" href="/image_compare.html">image compare</a>
  </nav>
  <button id="btn-upload" onclick="document.getElementById('folder-input').click()">Upload folder</button>
  <span id="status-text">no folder loaded</span>

<div class="workspace">

  <div class="sidebar">
    <div class="sidebar-title">Groups</div>
    <div class="sidebar-filter">
      <input type="text" id="filter-input" placeholder="Filter…" oninput="renderSidebar()">
    </div>
    <div class="group-list" id="group-list">
      <div class="empty-state" style="padding:24px 16px">

    <div class="n-slider-bar">
      <span class="controls-label">Training points</span>
      <input type="range" id="n-slider" min="0" max="0" value="0" oninput="onNSlider()">
      <span id="n-slider-label">—</span>
      <div class="controls-right">
        <span class="controls-label">Loss scale</span>

      </div>

      <div class="empty-state">
        <div class="icon">📈</div>
        <div>Upload a results folder, then select a group</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Shared Results Store (IndexedDB) ─────────────────────────────────────────

const ResultsStore = (() => {
  const DB = 'europa-results', STORE = 'entries', IMG_STORE = 'images';
  function open() {
    return new Promise((res, rej) => {
      const r = indexedDB.open(DB, 2);
      r.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE))     db.createObjectStore(STORE);
        if (!db.objectStoreNames.contains(IMG_STORE)) db.createObjectStore(IMG_STORE);
      };
      r.onsuccess = e => res(e.target.result);
      r.onerror   = e => rej(e.target.error);
    });
  }
  return {
    async save(entries) {
      const db = await open();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put({ entries, savedAt: Date.now() }, 'data');
        tx.oncomplete = () => { db.close(); res(); };
        tx.onerror    = e => rej(e.target.error);
      });
    },
    async load() {
      const db = await open();
      return new Promise((res, rej) => {
        const r = db.transaction(STORE,'readonly').objectStore(STORE).get('data');
        r.onsuccess = e => { db.close(); res(e.target.result ?? null); };
        r.onerror   = e => rej(e.target.error);
      });
    },
    async clear() {
      const db = await open();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete('data');
        tx.oncomplete = () => { db.close(); res(); };
        tx.onerror    = e => rej(e.target.error);
      });
    },
    async saveImages(data) {
      const db = await open();
      return new Promise((res, rej) => {
        const tx = db.transaction(IMG_STORE, 'readwrite');
        tx.objectStore(IMG_STORE).put(data, 'data');
        tx.oncomplete = () => { db.close(); res(); };
        tx.onerror    = e => rej(e.target.error);
      });
    },
  };
})();

function extractImagesFromUpload(fileList) {
  const imgs = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  if (!imgs.length) return null;
  const rootName = imgs[0].webkitRelativePath?.split('/')[0] || 'uploaded';
  const sfs = {};
  imgs.forEach(f => {
    const parts = f.webkitRelativePath ? f.webkitRelativePath.split('/') : [rootName, 'root', f.name];
    if (parts.length < 3) return;
    const sub = parts[1], base = parts[parts.length - 1];
    if (!sfs[sub]) sfs[sub] = { files: {}, names: [] };
    sfs[sub].files[base] = f;
    sfs[sub].names.push(base);
  });
  Object.values(sfs).forEach(sf =>
    sf.names.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }))
  );
  return Object.keys(sfs).length ? { subfolders: sfs, rootName, savedAt: Date.now() } : null;
}

// ── Constants ─────────────────────────────────────────────────────────────────

const PALETTE = [
  '#7ee8a2', '#5b8dee', '#f6a35c', '#e06cbb', '#60d4e4',
  '#b8a4f8', '#f9e15b', '#ff6b6b', '#4ecdc4', '#f7b731',
];

const THETA_AXES = ['SW_n_cc', 'SW_V_mps', 'SW_By_T'];
const PAIRS      = [[0, 1], [0, 2], [1, 2]];
const DIM_NAMES  = ['Density', 'Vx', 'Vy', 'Vz', 'Bx', 'By', 'Bz'];

// ── State ─────────────────────────────────────────────────────────────────────

let allEntries    = []; // { prefix, group, n, filename, losses, theta }
let groupColors   = {};
let colorIdx      = 0;
let selectedGroup = null;
let allNValues    = [];
let nIdx          = 0;
let lossChart     = null;
let thetaPlotInit    = false;
let marginalPlotsInit = false;
let yLogScale     = false;
let expanded      = new Set();

// ── File Loading ──────────────────────────────────────────────────────────────

document.getElementById('folder-input').addEventListener('change', async function (e) {
  const files = Array.from(e.target.files).filter(f => f.name.endsWith('.json'));
  if (!files.length) { e.target.value = ''; return; }

  const entries = [];
  for (const file of files) {
    try {
      const data  = JSON.parse(await file.text());
      const cp    = data.checkpoint || {};
      if (!Array.isArray(cp.losses) || !cp.losses.length) continue;

      const tests = Object.assign({}, data.tests || {});
      if (Array.isArray(cp.parameter_lengths)) tests['parameter_lengths'] = cp.parameter_lengths;
      if (Array.isArray(cp.spatial_lengths))   tests['spatial_lengths']   = cp.spatial_lengths;

      entries.push({
        prefix:     extractPrefix(data.group || 'unclassified'),
        group:      data.group || 'unclassified',
        n:          Array.isArray(data.theta) ? data.theta.length : null,
        filename:   file.name,
        tests,
        losses:     cp.losses,
        theta:      Array.isArray(data.theta) ? data.theta : [],
        residuals:  data.residuals || {},
      });
    } catch (_) {}
  }

  await ResultsStore.save(entries);
  const imgData = extractImagesFromUpload(e.target.files);
  if (imgData) ResultsStore.saveImages(imgData).catch(() => {});
  initFromEntries(entries);
  e.target.value = '';
});

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const cached = await ResultsStore.load();
    if (cached?.entries?.length) initFromEntries(cached.entries, true);
  } catch (_) {}
});

function initFromEntries(entries, fromCache = false) {
  if (lossChart) { lossChart.destroy(); lossChart = null; }
  allEntries    = entries;
  groupColors   = {};
  colorIdx      = 0;
  selectedGroup = null;
  allNValues        = [];
  nIdx              = 0;
  thetaPlotInit     = false;
  marginalPlotsInit = false;
  expanded          = new Set();

  const prefixColors = {};
  entries.forEach(e => {
    if (!(e.prefix in prefixColors)) {
      prefixColors[e.prefix] = PALETTE[colorIdx % PALETTE.length];
      colorIdx++;
    }
    groupColors[e.group] = prefixColors[e.prefix];
  });
  [...new Set(entries.map(e => e.prefix))].forEach(p => expanded.add(p));

  const nGroups = Object.keys(groupColors).length;
  const src     = fromCache ? ' · from cache' : '';
  document.getElementById('status-text').textContent =
    `${nGroups} group${nGroups !== 1 ? 's' : ''}${src}`;
  document.getElementById('status-text').classList.add('loaded');

  clearChartArea();
  renderSidebar();
}

function extractPrefix(g) {
  if (!g) return 'unclassified';
  const m = g.match(/^([a-zA-Z]+(?:-[a-zA-Z]+)*)/);
  return m ? m[1].toLowerCase() : g;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function renderSidebar() {
  const filter    = (document.getElementById('filter-input').value || '').toLowerCase();
  const container = document.getElementById('group-list');

  if (!allEntries.length) {
    container.innerHTML = `<div class="empty-state" style="padding:24px 16px">
      <div class="icon">📂</div><div>Upload a results folder</div></div>`;
    return;
  }

  const prefixMap = {};
  allEntries.forEach(e => {
    if (!prefixMap[e.prefix]) prefixMap[e.prefix] = new Set();
    prefixMap[e.prefix].add(e.group);
  });

  container.innerHTML = '';

  Object.keys(prefixMap).sort().forEach(prefix => {
    const groups   = [...prefixMap[prefix]];
    const isExpand = expanded.has(prefix);
    const hasSel   = groups.includes(selectedGroup);

    const visible = filter
      ? groups.filter(g => g.toLowerCase().includes(filter) || prefix.includes(filter))
      : groups;
    if (!visible.length) return;

    const section = document.createElement('div');
    section.className = 'prefix-section';

    const header = document.createElement('div');
    header.className = 'prefix-header' + (hasSel ? ' is-selected' : '');
    header.innerHTML = `
      <span class="prefix-arrow">${isExpand ? '▼' : '▶'}</span>
      <span class="prefix-label">${escHtml(prefix)}</span>
      <span class="prefix-pts">${visible.length} group${visible.length !== 1 ? 's' : ''}</span>
    `;
    header.addEventListener('click', () => {
      expanded.has(prefix) ? expanded.delete(prefix) : expanded.add(prefix);
      renderSidebar();
    });
    section.appendChild(header);

    if (isExpand) {
      const entriesDiv = document.createElement('div');

      visible.sort().forEach(group => {
        const isSel  = group === selectedGroup;
        const color  = groupColors[group] || '#888';
        const ns     = [...new Set(
          allEntries.filter(e => e.group === group && e.n !== null).map(e => e.n)
        )].sort((a, b) => a - b);
        const ptLabel = ns.length
          ? (ns.length === 1 ? `n=${ns[0]}` : `n=${ns[0]}–${ns[ns.length-1]}`)
          : '?';

        const row = document.createElement('div');
        row.className = 'entry-row' + (isSel ? ' active' : '');
        row.innerHTML = `
          <span class="entry-dot" style="background:${color}"></span>
          <span class="entry-name" title="${escAttr(group)}">${escHtml(group)}</span>
          <span class="entry-n">${ptLabel}</span>
        `;
        row.addEventListener('click', () => selectGroup(group));
        entriesDiv.appendChild(row);
      });

      section.appendChild(entriesDiv);
    }

    container.appendChild(section);
  });
}

function selectGroup(group) {
  selectedGroup = group;

  const ns = [...new Set(
    allEntries.filter(e => e.group === group && e.n !== null).map(e => e.n)
  )].sort((a, b) => a - b);
  allNValues = ns;
  nIdx = allNValues.length - 1;

  const slider = document.getElementById('n-slider');
  slider.min   = 0;
  slider.max   = Math.max(0, allNValues.length - 1);
  slider.value = nIdx;
  updateNLabel();

  renderSidebar();
  ensureChartArea();
  updateCharts();
}

// ── N Slider ──────────────────────────────────────────────────────────────────

function onNSlider() {
  nIdx = parseInt(document.getElementById('n-slider').value, 10);
  updateNLabel();
  updateCharts();
}

function updateNLabel() {
  const n = allNValues[nIdx] ?? null;
  document.getElementById('n-slider-label').textContent = n !== null ? `n = ${n}` : '—';
}

// ── Chart area lifecycle ──────────────────────────────────────────────────────

function clearChartArea() {
  if (lossChart) { lossChart.destroy(); lossChart = null; }
  thetaPlotInit     = false;
  marginalPlotsInit = false;
  document.getElementById('charts-area').innerHTML = `<div class="empty-state">
    <div class="icon">📈</div>
    <div>Upload a results folder, then select a group</div></div>`;
}

function ensureChartArea() {
  if (document.getElementById('loss-canvas')) return; // already built

  if (lossChart) { lossChart.destroy(); lossChart = null; }
  thetaPlotInit     = false;
  marginalPlotsInit = false;

  document.getElementById('charts-area').innerHTML = `
    <div class="chart-card" id="loss-card">
      <div class="chart-title"  id="loss-title">Training Loss</div>
      <div class="chart-subtitle" id="loss-subtitle"></div>
      <div class="chart-wrap"><canvas id="loss-canvas"></canvas></div>
    </div>
    <div class="chart-card" id="theta-card">
      <div class="chart-title"   id="theta-title">Training Points</div>
      <div class="chart-subtitle" id="theta-subtitle"></div>
      <div class="theta-wrap" id="theta-plot"></div>
    </div>
    <div class="chart-card" id="pairs-card">
      <div class="chart-title"    id="pairs-title">Pairwise Marginals</div>
      <div class="chart-subtitle" id="pairs-subtitle"></div>
      <div class="pairs-grid">
        <div class="pair-wrap" id="pair-plot-01"></div>
        <div class="pair-wrap" id="pair-plot-02"></div>
        <div class="pair-wrap" id="pair-plot-12"></div>
      </div>
    </div>
    <div class="chart-card" id="hist-card">
      <div class="chart-title"    id="hist-title">1D Marginals</div>
      <div class="chart-subtitle" id="hist-subtitle"></div>
      <div class="pairs-grid">
        <div class="hist-wrap" id="hist-plot-0"></div>
        <div class="hist-wrap" id="hist-plot-1"></div>
        <div class="hist-wrap" id="hist-plot-2"></div>
      </div>
    </div>
    <div id="msr-container"></div>
  `;
}

function updateCharts() {
  updateLossChart();
  updateThetaChart();
  updateMarginalCharts();
  updateMsrCharts();
}

// ── Loss Chart ────────────────────────────────────────────────────────────────

function updateLossChart() {
  const n     = allNValues[nIdx] ?? null;
  const entry = allEntries.find(e => e.group === selectedGroup && e.n === n);
  if (!entry) return;

  const losses = entry.losses;
  const color  = groupColors[selectedGroup] || '#7ee8a2';
  const pts    = losses.map((y, i) => ({ x: i + 1, y }));

  const hasNeg = losses.some(v => v <= 0);
  if (yLogScale && hasNeg) {
    yLogScale = false;
    document.getElementById('btn-scale').textContent = 'linear';
  }
  document.getElementById('btn-scale').disabled = hasNeg;

  if (!lossChart) {
    const ctx = document.getElementById('loss-canvas');
    lossChart = new Chart(ctx, makeLossConfig(pts, color));
  } else {
    lossChart.data.datasets[0].data         = pts;
    lossChart.data.datasets[0].borderColor  = color;
    lossChart.data.datasets[0].backgroundColor = color;
    lossChart.options.scales.y.type = yLogScale ? 'logarithmic' : 'linear';
    lossChart.update('none');
  }

  document.getElementById('loss-title').textContent    = `Training Loss — ${selectedGroup}`;
  document.getElementById('loss-subtitle').textContent = `n = ${n}  ·  ${losses.length} iterations`;
}

function makeLossConfig(pts, color) {
  return {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'loss', data: pts,
        borderColor: color, backgroundColor: color,
        showLine: true, borderWidth: 1.5,
        pointRadius: 0, pointHoverRadius: 4,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 150 },
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: 'Iteration', color: '#555560', font: { family: "'JetBrains Mono', monospace", size: 10 } },
          grid:  { color: '#222227' },
          ticks: { color: '#555560', font: { family: "'JetBrains Mono', monospace", size: 10 } },
        },
        y: {
          type: yLogScale ? 'logarithmic' : 'linear',
          title: { display: true, text: 'Loss', color: '#555560', font: { family: "'JetBrains Mono', monospace", size: 10 } },
          grid:  { color: '#222227' },
          ticks: { color: '#555560', font: { family: "'JetBrains Mono', monospace", size: 10 } },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#17171a', borderColor: '#2a2a2f', borderWidth: 1,
          titleColor: '#e8e8ed', bodyColor: '#888890',
          titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
          bodyFont:  { family: "'JetBrains Mono', monospace", size: 11 },
          callbacks: {
            title: items => `iter ${items[0].parsed.x}`,
            label: item  => ` loss: ${item.parsed.y.toExponential(4)}`,
          },
        },
      },
    },
  };
}

function toggleScale() {
  yLogScale = !yLogScale;
  document.getElementById('btn-scale').textContent = yLogScale ? 'log' : 'linear';
  if (lossChart) {
    lossChart.options.scales.y.type = yLogScale ? 'logarithmic' : 'linear';
    lossChart.update('none');
  }
}

// ── Theta (3D) Chart ──────────────────────────────────────────────────────────

function updateThetaChart() {
  const n     = allNValues[nIdx] ?? null;
  const entry = allEntries.find(e => e.group === selectedGroup && e.n === n);
  if (!entry || !entry.theta.length) return;

  const theta = entry.theta; // array of [x, y, z] points
  const xs    = theta.map(p => p[0]);
  const ys    = theta.map(p => p[1]);
  const zs    = theta.map(p => p[2]);
  const idxs  = theta.map((_, i) => i); // color by acquisition order

  const trace = {
    type: 'scatter3d',
    mode: 'markers',
    x: xs, y: ys, z: zs,
    marker: {
      size: 5,
      color: idxs,
      colorscale: [[0, '#5b8dee'], [0.5, '#b8a4f8'], [1, '#7ee8a2']],
      showscale: true,
      colorbar: {
        title: { text: 'Order', font: { family: "'JetBrains Mono', monospace", size: 10, color: '#888890' } },
        thickness: 12,
        len: 0.6,
        tickfont: { family: "'JetBrains Mono', monospace", size: 9, color: '#888890' },
        outlinecolor: '#2a2a2f',
      },
      line: { width: 0 },
    },
    hovertemplate:
      `<b>Point %{text}</b><br>` +
      `${THETA_AXES[0]}: %{x:.3f}<br>` +
      `${THETA_AXES[1]}: %{y:.3f}<br>` +
      `${THETA_AXES[2]}: %{z:.3f}<extra></extra>`,
    text: idxs.map(i => i + 1),
  };

  const layout = {
    paper_bgcolor: '#17171a',
    scene: {
      bgcolor: '#17171a',
      xaxis: axisLayout(THETA_AXES[0]),
      yaxis: axisLayout(THETA_AXES[1]),
      zaxis: axisLayout(THETA_AXES[2]),
      camera: { eye: { x: 1.5, y: 1.5, z: 1.2 } },
    },
    margin: { l: 0, r: 60, t: 0, b: 0 },
    font: { family: "'JetBrains Mono', monospace", size: 10, color: '#888890' },
  };

  const config = { responsive: true, displayModeBar: false };

  const plotEl = document.getElementById('theta-plot');
  if (!thetaPlotInit) {
    Plotly.newPlot(plotEl, [trace], layout, config);
    thetaPlotInit = true;
  } else {
    Plotly.react(plotEl, [trace], layout, config);
  }

  document.getElementById('theta-title').textContent    = `Training Points — ${selectedGroup}`;
  document.getElementById('theta-subtitle').textContent = `n = ${n}  ·  color = acquisition order`;
}

// ── Pairwise + Histogram Marginals ────────────────────────────────────────────

function updateMarginalCharts() {
  const n     = allNValues[nIdx] ?? null;
  const entry = allEntries.find(e => e.group === selectedGroup && e.n === n);
  if (!entry || !entry.theta.length) return;

  const theta      = entry.theta;
  const idxs       = theta.map((_, i) => i);
  const colorscale = [[0, '#5b8dee'], [0.5, '#b8a4f8'], [1, '#7ee8a2']];
  const cfg        = { responsive: true, displayModeBar: false };

  PAIRS.forEach(([a, b]) => {
    const trace = {
      type: 'scatter',
      mode: 'markers',
      x: theta.map(p => p[a]),
      y: theta.map(p => p[b]),
      marker: {
        size: 6,
        color: idxs,
        colorscale,
        showscale: false,
        line: { width: 0 },
      },
      hovertemplate:
        `${THETA_AXES[a]}: %{x:.3f}<br>${THETA_AXES[b]}: %{y:.3f}<br>` +
        `order: %{marker.color}<extra></extra>`,
    };
    const layout = pairScatterLayout(THETA_AXES[a], THETA_AXES[b]);
    const el = document.getElementById(`pair-plot-${a}${b}`);
    if (!marginalPlotsInit) {
      Plotly.newPlot(el, [trace], layout, cfg);
    } else {
      Plotly.react(el, [trace], layout, cfg);
    }
  });

  const dimVals = THETA_AXES.map((_, i) => theta.map(p => p[i]));
  const nBins   = Math.max(...dimVals.map(fdBinCount));

  THETA_AXES.forEach((ax, i) => {
    const vals  = dimVals[i];
    const trace = {
      type: 'histogram',
      x: vals,
      xbins: xbinsForCount(vals, nBins),
      marker: { color: '#7ee8a2', opacity: 0.75, line: { color: '#17171a', width: 0.5 } },
    };
    const el = document.getElementById(`hist-plot-${i}`);
    if (!marginalPlotsInit) {
      Plotly.newPlot(el, [trace], marginalHistLayout(ax), cfg);
    } else {
      Plotly.react(el, [trace], marginalHistLayout(ax), cfg);
    }
  });

  marginalPlotsInit = true;

  document.getElementById('pairs-title').textContent    = `Pairwise Marginals — ${selectedGroup}`;
  document.getElementById('pairs-subtitle').textContent = `n = ${n}  ·  color = acquisition order`;
  document.getElementById('hist-title').textContent     = `1D Marginals — ${selectedGroup}`;
  document.getElementById('hist-subtitle').textContent  = `n = ${n}`;
}

function fdBinCount(vals) {
  const sorted = [...vals].sort((a, b) => a - b);
  const n   = sorted.length;
  const q1  = sorted[Math.floor(n * 0.25)];
  const q3  = sorted[Math.floor(n * 0.75)];
  const iqr = q3 - q1;
  const mn  = sorted[0], mx = sorted[n - 1];
  if (iqr === 0) return Math.max(6, Math.ceil(Math.sqrt(n)));
  return Math.max(6, Math.ceil((mx - mn) / (2 * iqr / Math.cbrt(n))));
}

function xbinsForCount(vals, nBins) {
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const size = (mx - mn) / nBins;
  return { start: mn - size * 0.5, end: mx + size * 0.5, size };
}

const MONO_FONT = { family: "'JetBrains Mono', monospace", size: 9, color: '#888890' };

function pairScatterLayout(xTitle, yTitle) {
  return {
    paper_bgcolor: '#17171a',
    plot_bgcolor:  '#17171a',
    xaxis: {
      title: { text: xTitle, font: MONO_FONT },
      gridcolor: '#2a2a2f', linecolor: '#2a2a2f',
      tickfont: MONO_FONT, zeroline: false,
    },
    yaxis: {
      title: { text: yTitle, font: MONO_FONT },
      gridcolor: '#2a2a2f', linecolor: '#2a2a2f',
      tickfont: MONO_FONT, zeroline: false,
    },
    margin: { l: 52, r: 8, t: 8, b: 46 },
    font: MONO_FONT,
    showlegend: false,
  };
}

function marginalHistLayout(xTitle) {
  return {
    paper_bgcolor: '#17171a',
    plot_bgcolor:  '#17171a',
    xaxis: {
      title: { text: xTitle, font: MONO_FONT },
      gridcolor: '#2a2a2f', linecolor: '#2a2a2f',
      tickfont: MONO_FONT, zeroline: false,
    },
    yaxis: {
      title: { text: 'count', font: MONO_FONT },
      gridcolor: '#2a2a2f', linecolor: '#2a2a2f',
      tickfont: MONO_FONT, zeroline: false,
    },
    margin: { l: 40, r: 8, t: 8, b: 46 },
    font: MONO_FONT,
    bargap: 0.06,
    showlegend: false,
  };
}

function axisLayout(title) {
  return {
    title: { text: title, font: { family: "'JetBrains Mono', monospace", size: 10, color: '#888890' } },
    gridcolor: '#2a2a2f',
    linecolor: '#2a2a2f',
    tickfont:  { family: "'JetBrains Mono', monospace", size: 9, color: '#888890' },
    backgroundcolor: '#17171a',
    showbackground: true,
  };
}

// ── MSR residual distribution panels ─────────────────────────────────────────

function updateMsrCharts() {
  const container = document.getElementById('msr-container');
  if (!container) return;

  const n     = allNValues[nIdx] ?? null;
  const entry = allEntries.find(e => e.group === selectedGroup && e.n === n);
  const residuals = entry?.residuals || {};
  const msrKeys   = Object.keys(residuals).sort();

  container.innerHTML = '';
  if (!msrKeys.length) return;

  const cfg = { responsive: true, displayModeBar: false };

  msrKeys.forEach(key => {
    const inner = residuals[key]?.[key];
    if (!Array.isArray(inner) || !inner.length) return;

    const nDims = inner[0].length;

    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="chart-title">${escHtml(key)}</div>
      <div class="chart-subtitle">${escHtml(selectedGroup)} · n = ${n} · ${inner.length} test points</div>
    `;
    const grid = document.createElement('div');
    grid.className = 'pairs-grid';
    card.appendChild(grid);
    container.appendChild(card);

    for (let d = 0; d < nDims; d++) {
      const vals  = inner.map(row => row[d]);
      const label = DIM_NAMES[d] || `dim ${d}`;

      const wrap = document.createElement('div');
      wrap.className = 'hist-wrap';
      grid.appendChild(wrap);

      Plotly.newPlot(wrap, [{
        type: 'histogram',
        x: vals,
        marker: { color: '#7ee8a2', opacity: 0.75, line: { color: '#17171a', width: 0.5 } },
        hovertemplate: '%{x:.3e}: %{y}<extra></extra>',
      }], {
        paper_bgcolor: '#17171a',
        plot_bgcolor:  '#17171a',
        title: { text: label, font: MONO_FONT, x: 0.5, xanchor: 'center' },
        xaxis: {
          title: { text: 'squared residual', font: MONO_FONT },
          gridcolor: '#2a2a2f', linecolor: '#2a2a2f', tickfont: MONO_FONT, zeroline: false,
        },
        yaxis: {
          title: { text: 'count', font: MONO_FONT },
          gridcolor: '#2a2a2f', linecolor: '#2a2a2f', tickfont: MONO_FONT, zeroline: false,
        },
        margin: { l: 40, r: 8, t: 28, b: 46 },
        font: MONO_FONT,
        bargap: 0.06,
        showlegend: false,
      }, cfg);
    }
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escAttr(s) {
  return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
